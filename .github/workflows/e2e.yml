name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent runs racing on the shared test database.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Supabase (dedicated TEST project) ------------------------------------
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Stripe / Resend / Upstash (test keys) --------------------------------
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # App + test config ----------------------------------------------------
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Debug — secret names visible to Actions
        run: |
          echo "Secret NAMES visible to this workflow (values are masked by GitHub):"
          cat <<'EOF'
          ${{ toJSON(secrets) }}
          EOF

      - name: Verify required secrets are present
        run: |
          fail=0
          check() {
            if [ -z "$2" ]; then
              echo "::error::Secret '$1' is EMPTY or not set"
              fail=1
            else
              echo "OK: $1 is set (${#2} chars)"
            fi
          }
          check NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          check NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          check SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          check SUPABASE_ACCESS_TOKEN "$SUPABASE_ACCESS_TOKEN"
          check TEST_EMAIL "$TEST_EMAIL"
          check TEST_PASSWORD "$TEST_PASSWORD"
          if [ "$fail" = "1" ]; then
            echo "::error::One or more required secrets are missing. Add them under Settings → Secrets and variables → Actions → Repository secrets (NOT Variables)."
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Seed test database (schema + data + admin user)
        run: npm run seed:test

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
